<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar — SMART BSU</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <!-- Efek Latar Belakang -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="auth-wrapper">
        <!-- Tombol Kembali -->
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
        
        <div class="auth-card">
            <!-- Header Kartu -->
            <div class="auth-header">
                <div class="logo-icon"><i class="fas fa-recycle"></i></div>
                <h2>SMART <b>BSU</b></h2>
                <p id="auth-subtitle">Selamat datang kembali! Silakan masuk ke akun Anda.</p>
            </div>

            <!-- Tab Navigasi Login / Daftar -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Masuk</button>
                <button class="auth-tab" id="tab-signup">Daftar</button>
            </div>

            <!-- FORM LOGIN -->
            <form id="form-login" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Masukkan email terdaftar" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Masukkan password" required>
                        <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <!-- Pesan Error Dinamis -->
                <div class="form-message" id="login-msg"></div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Masuk Sekarang <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <!-- FORM SIGN UP -->
            <form id="form-signup" class="auth-form">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-nama" placeholder="Contoh: Budi Santoso" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="email@contoh.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <div class="input-with-icon">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" id="reg-tgl" required>
                    </div>
                </div>
                
                <!-- Grid 2 Kolom untuk Select -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Kecamatan</label>
                        <div class="input-with-icon">
                            <i class="fas fa-map-marker-alt"></i>
                            <select id="reg-kecamatan" required>
                                <option value="" disabled selected>Pilih Wilayah</option>
                                <option value="Bogor Barat">Bogor Barat</option>
                                <option value="Bogor Timur">Bogor Timur</option>
                                <option value="Bogor Selatan">Bogor Selatan</option>
                                <option value="Bogor Utara">Bogor Utara</option>
                                <option value="Bogor Tengah">Bogor Tengah</option>
                                <option value="Tanah Sareal">Tanah Sareal</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Sektor</label>
                        <div class="input-with-icon">
                            <i class="fas fa-briefcase"></i>
                            <select id="reg-sektor" required>
                                <option value="" disabled selected>Pilih Kategori</option>
                                <option value="Rumah Tangga">Rumah Tangga</option>
                                <option value="Kuliner">Kuliner</option>
                                <option value="Pasar">Pasar</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Buat password minimal 6 karakter" required minlength="6">
                        <button type="button" class="toggle-password" tabindex="-1"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <!-- Pesan Error/Sukses Dinamis -->
                <div class="form-message" id="reg-msg"></div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Daftar Akun Baru <i class="fas fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
